<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Change Password | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('settings') }}">←</a><div class="brand">change password</div></header><main class="feed narrow-feed"><section class="profile-card flow-card"><div class="step-indicator">Step {{ step }} of 2</div>{% for error in errors %}<p class="inline-error">{{ error }}</p>{% endfor %}{% if step == 1 %}<h1>Verify your password</h1><form method="post" class="stack-form"><input type="hidden" name="step" value="1"><label>Current Password<input type="password" name="current_password" required></label><a href="#" class="forgot-placeholder" onclick="return false">Forgot Password?</a><button class="primary-button">Proceed</button></form>{% else %}<h1>Create a new password</h1><form method="post" class="stack-form"><input type="hidden" name="step" value="2"><label>New Password<input type="password" name="new_password" minlength="8" required></label><label>Confirm New Password<input type="password" name="confirm_password" minlength="8" required></label><button class="primary-button">Update password</button></form>{% endif %}</section></main></body></html>
