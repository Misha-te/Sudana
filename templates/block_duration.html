<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Block @{{ person.username }} | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('block_search') }}">←</a><div class="brand">block duration</div></header><main class="feed narrow-feed"><section class="profile-card flow-card"><h1>How long would you like to block this user?</h1><p class="muted">@{{ person.username }}</p>{% if error %}<p class="inline-error">{{ error }}</p>{% endif %}<form method="post" class="stack-form"><div class="name-options"><label><input type="radio" name="duration" value="24" required><span>24 hours</span></label><label><input type="radio" name="duration" value="48"><span>48 hours</span></label><label><input type="radio" name="duration" value="168"><span>1 week</span></label><label><input type="radio" name="duration" value="custom"><span>Custom duration</span></label></div><label>Custom end date and time<input type="datetime-local" name="custom_until"></label><button class="primary-button danger-button">Block @{{ person.username }}</button></form></section></main></body></html>
