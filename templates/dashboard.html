<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Sudana</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="navbar">
        <div class="logo">Sudana</div>

        <div class="nav-icons">
            <a href="#" class="icon-btn" title="MyGeez — Connections">🤝</a>
            <a href="#" class="icon-btn" title="Dating">❤️</a>
            <a href="#" class="icon-btn" title="News &amp; Entertainment">📰</a>
        </div>

        <div class="nav-right">
            <a href="{{ url_for('profile', name=username) }}" class="avatar"
               title="My Profile">{{ username[0]|upper }}</a>
            <a href="{{ url_for('home') }}" class="logout-link">Log out</a>
        </div>
    </header>

    <main class="dashboard">
        <h1>Welcome back, <span class="username">{{ username }}</span> <span class="star">★</span></h1>
        <p class="dashboard-subtitle">Pick an icon above to get started.</p>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Sudana. All rights reserved.</p>
    </footer>
</body>
</html>
