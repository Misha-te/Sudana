<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign Up | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body><header class="navbar"><div class="logo">Sudana</div><nav><a href="{{ url_for('home') }}">Home</a></nav></header><main class="form-page"><section class="form-card"><h1>Create your account <span class="star">★</span></h1><p class="subtitle">Fields marked with an asterisk (*) are required.</p>
{% if errors %}<ul class="errors">{% for error in errors %}<li>{{ error }}</li>{% endfor %}</ul>{% endif %}
<form method="post" action="{{ url_for('signup') }}" class="stack-form signup-form">
<label>First name <span class="required-star">*</span><input name="first_name" value="{{ first_name or '' }}" required autocomplete="given-name"></label>
<label>Middle name <small>(Optional)</small><input name="middle_name" value="{{ middle_name or '' }}" autocomplete="additional-name"></label>
<label>Last name <span class="required-star">*</span><input name="last_name" value="{{ last_name or '' }}" required autocomplete="family-name"></label>
<label>Username <small>(Optional)</small><input name="username" value="{{ username or '' }}" autocomplete="username"><small class="hint">If left blank, Sudana displays your first and last name.</small></label>
<label>Phone number or email <span class="required-star">*</span><input name="contact" value="{{ contact or '' }}" required autocomplete="email" placeholder="you@example.com or +211..."></label>
<label>Password <span class="required-star">*</span><input type="password" name="password" minlength="8" required autocomplete="new-password"><small class="hint">At least 8 characters.</small></label>
<label>Gender <span class="required-star">*</span><select name="gender" required><option value="">Select gender</option>{% for item in ['Male','Female','Other','Prefer not to say'] %}<option {{ 'selected' if gender == item }}>{{ item }}</option>{% endfor %}</select></label>
<label>Hometown<input name="hometown" value="{{ hometown or '' }}"></label>
<label>Current location<input name="current_location" value="{{ current_location or '' }}"></label>
<label>Date of birth <span class="required-star">*</span><input type="date" name="dob" value="{{ dob or '' }}" required></label>
<button class="cta form-submit">Continue</button></form><p class="subtitle"><a href="{{ url_for('login') }}">Already have an account? Log in</a></p></section></main></body></html>
