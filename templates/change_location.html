<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Location | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('settings') }}">←</a><div class="brand">location</div></header><main class="feed narrow-feed"><section class="profile-card flow-card"><h1>Update location</h1>{% if success %}<p class="success">{{ success }}</p>{% endif %}<form method="post" class="stack-form">{% if user.get('is_south_sudanese', True) %}<label>Hometown<input name="hometown" value="{{ user.hometown }}" required></label>{% else %}<label>Home Country<input name="home_country" value="{{ user.get('home_country','') }}" required></label>{% endif %}<button class="primary-button">Save location</button></form></section></main></body></html>
