<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ peer_name }} | Messages</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('messages') }}">←</a><div class="conversation-title"><strong>{{ peer_name }}</strong><small>@{{ peer.username }}</small></div><span></span></header><main class="feed narrow-feed"><section class="profile-card thread">{% for message in thread %}<div class="bubble {{ 'mine' if message.sender == user.username else 'theirs' }}"><small>{{ peer_name if message.sender == peer.username else 'You' }}</small><p>{{ message.text }}</p></div>{% else %}<p class="muted">Start the conversation.</p>{% endfor %}</section><form class="message-composer" method="post" action="{{ url_for('send_message', username=peer.username) }}"><input name="message" placeholder="Message @{{ peer.username }}" required autocomplete="off"><button aria-label="Send">➤</button></form></main></body></html>
