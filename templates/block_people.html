<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Block People | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('settings') }}">←</a><div class="brand">block people</div><a class="add-block-button" href="{{ url_for('block_search') }}" aria-label="Block someone">+</a></header><main class="feed narrow-feed"><section class="profile-card"><div class="section-heading"><div><h1>Blocked people</h1><p class="muted">Blocked people cannot message you during the selected period.</p></div><a class="add-block-button inline" href="{{ url_for('block_search') }}">+</a></div>{% for block in blocks %}<div class="blocked-row"><div><strong>@{{ block.username }}</strong><small>{{ 'Until ' + block.expires_at.replace('T',' ') if block.expires_at else 'No expiration set' }}</small></div><form method="post"><input type="hidden" name="username" value="{{ block.username }}"><button class="text-button">Unblock</button></form></div>{% else %}<div class="empty-state"><p>You have not blocked anyone.</p></div>{% endfor %}</section></main></body></html>
