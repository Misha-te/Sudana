<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Report a Problem | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('support') }}">←</a><div class="brand">report a problem</div></header><main class="feed narrow-feed"><section class="profile-card">{% for error in errors %}<p class="inline-error">{{ error }}</p>{% endfor %}<form method="post" enctype="multipart/form-data" class="stack-form"><label>Problem title *<input name="title" maxlength="200" required></label><label>Where did it happen? *<select name="app_area" required><option value="">Select area</option>{% for area in ['Signup or login','Home and posts','MyGs','Messages','Notifications','Profile','Settings','Other'] %}<option>{{ area }}</option>{% endfor %}</select></label><label>Description *<textarea name="description" rows="6" required></textarea></label><label>Screenshot (optional)<input type="file" name="screenshot" accept="image/png,image/jpeg,image/gif,image/webp"><small>PNG, JPG, GIF, or WebP; maximum 3 MB.</small></label><label>Device or browser (optional)<input name="device_info" placeholder="Example: iPhone Safari"></label><button class="primary-button">Submit report</button></form></section></main></body></html>
