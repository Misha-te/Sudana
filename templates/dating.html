<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dating | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('dashboard') }}">←</a><div class="brand">dating</div></header><main class="feed"><div class="profile-card"><h1>Discover people</h1><p class="hint">Connect respectfully. Only share what feels safe.</p>{% for person in people %}<article class="person-row"><div><strong>{{ person.first_name }} {{ person.last_name }}</strong><p>@{{ person.username }} · {{ person.get('home_country') or person.hometown }}</p></div><a class="cta" href="{{ url_for('profile', name=person.username) }}">View profile</a></article>{% else %}<p>No profiles available.</p>{% endfor %}</div></main></body></html>
