<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Forgot Password | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><main class="form-page"><section class="form-card"><h1>Forgot password?</h1><p class="subtitle">Enter the email address or phone number connected to your account.</p>{% for error in errors %}<p class="inline-error">{{ error }}</p>{% endfor %}<form method="post" class="stack-form"><label>Email or phone number<input name="identifier" required autofocus></label><button class="primary-button">Send reset code</button></form><p><a href="{{ url_for('login') }}">Back to login</a></p></section></main></body></html>
