<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset Password | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><main class="form-page"><section class="form-card"><h1>Create a new password</h1>{% for error in errors %}<p class="inline-error">{{ error }}</p>{% endfor %}<form method="post" class="stack-form"><label>New password<input type="password" name="password" minlength="8" required></label><label>Confirm new password<input type="password" name="confirm_password" minlength="8" required></label><button class="primary-button">Update password</button></form></section></main></body></html>
