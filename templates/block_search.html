<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Find User | Sudana</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body class="app-body"><header class="topbar"><a class="hamburger back-link" href="{{ url_for('block_people') }}">←</a><div class="brand">find a user</div></header><main class="feed narrow-feed"><section class="profile-card"><form class="search-bar" method="get"><input name="q" value="{{ q }}" placeholder="Search username or name" autofocus><button>Search</button></form>{% for person in results %}<a class="search-person" href="{{ url_for('block_duration', username=person.username) }}"><span class="conversation-avatar">{{ person.first_name[0]|upper }}</span><span><strong>{{ display_name(person) }}</strong><small>@{{ person.username }}</small></span><i>›</i></a>{% else %}{% if q %}<p class="empty-state">No users found.</p>{% endif %}{% endfor %}</section></main></body></html>
